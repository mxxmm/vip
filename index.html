<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1f2833;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #2f3e46;
        }

        h2 {
            color: #66fcf1;
            margin-bottom: 10px;
            font-size: 26px;
            font-weight: 600;
        }

        p.subtitle {
            color: #85929E;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #66fcf1;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff33;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: left;
            direction: ltr;
        }

        input:focus {
            outline: none;
            border-color: #66fcf1;
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45c4be;
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.4);
        }

        button:disabled {
            background-color: #457b78;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .alert {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .alert-success {
            background-color: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .alert-error {
            background-color: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #0b0c10;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-left: 8px;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>إنشاء حساب جديد</h2>
        <p class="subtitle">سجل الآن ليدخل حسابك مباشرة في التطبيق</p>

        <div class="input-group">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="input-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button id="btnSignUp">
            <span class="loading" id="loader"></span>
            <span id="btnText">إنشاء الحساب</span>
        </button>

        <div class="alert alert-success" id="successAlert">تم إنشاء الحساب وحقن كافة البيانات المطلوبة للـ Splash بنجاح! جرب افتح التطبيق الآن.</div>
        <div class="alert alert-error" id="errorAlert"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxVjhjN7Pr9M-fSSOepieJh8fahQDDkrc",
            authDomain: "real-money-game-ad3b8.firebaseapp.com",
            databaseURL: "https://real-money-game-ad3b8-default-rtdb.firebaseio.com",
            projectId: "real-money-game-ad3b8",
            storageBucket: "real-money-game-ad3b8.firebasestorage.app",
            messagingSenderId: "280751444756",
            appId: "1:280751444756:android:603b3f1fcebe6742b46801"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const btnSignUp = document.getElementById('btnSignUp');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');

        btnSignUp.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            successAlert.style.display = 'none';
            errorAlert.style.display = 'none';

            if (!email || !password) {
                showError("يرجى ملء جميع الحقول المطلوبة.");
                return;
            }

            if (password.length < 6) {
                showError("يجب أن تكون كلمة المرور من 6 أحرف أو أكثر.");
                return;
            }

            setLoading(true);

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    const authUid = user.uid; 
                    const defaultName = email.split('@')[0];

                    // حقن كل المفاتيح الشائعة التي تسبب نل وبكافة الأشكال (نص ورقم)
                    set(ref(database, 'users/' + authUid), {
                        // معرفات المستخدم
                        Uid: authUid,
                        uid: authUid,
                        id: authUid,
                        
                        // بيانات الحساب الأساسية
                        email: email,
                        password: password,
                        name: defaultName,
                        username: defaultName,
                        
                        // الرصيد والنقاط بكافة الصيغ (نصوص وأرقام لقطع الشك باليقين)
                        coins: "0",
                        money: "0",
                        points: "0",
                        balance: "0",
                        coins_num: 0,
                        money_num: 0,
                        points_num: 0,
                        balance_num: 0,
                        
                        // الحالات والتعريفات الإضافية
                        status: "active",
                        device_id: "web_user",
                        phone: ""
                    })
                    .then(() => {
                        setLoading(false);
                        successAlert.style.display = 'block';
                        emailInput.value = '';
                        passwordInput.value = '';
                    })
                    .catch((dbError) => {
                        setLoading(false);
                        showError("فشل إضافة البيانات المساعدة: " + dbError.message);
                    });
                })
                .catch((error) => {
                    setLoading(false);
                    let errorMessage = "حدث خطأ أثناء إنشاء الحساب.";
                    if (error.code === 'auth/email-already-in-use') {
                        errorMessage = "هذا البريد الإلكتروني مستخدم بالفعل.";
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = "صيغة البريد الإلكتروني غير صحيحة.";
                    } else if (error.code === 'auth/weak-password') {
                        errorMessage = "كلمة المرور ضعيفة جداً.";
                    } else {
                        errorMessage = error.message;
                    }
                    showError(errorMessage);
                });
        });

        function showError(msg) {
            errorAlert.innerText = msg;
            errorAlert.style.display = 'block';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnSignUp.disabled = true;
                loader.style.display = 'inline-block';
                btnText.innerText = "جاري الحفظ والتهيئة...";
            } else {
                btnSignUp.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = "إنشاء الحساب";
            }
        }
    </script>
</body>
</html>
